<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bingo Cosplay - Japan Expo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="bg-photo" class="bg-photo" aria-hidden="true"></div>
<div class="bg-scrim" aria-hidden="true"></div>

<!-- Écran de sélection du joueur -->
<div id="player-select" class="player-select">
  <h1 class="ps-title">🎌 Bingo Cosplay <span class="highlight">Japan Expo</span></h1>
  <p class="ps-subtitle">Choisis ton profil</p>
  <div id="player-buttons" class="player-cards"></div>
</div>

<!-- Application principale -->
<div id="app" class="app" hidden>

  <header class="topbar">
    <span id="player-name-label" class="player-chip"></span>
    <button id="switch-player-btn" class="switch-player-btn" title="Changer de joueur">🔁</button>
  </header>

  <main class="app-main">

    <section class="stat-panel">
      <div class="progress-info">
        <span id="score">0 / 9</span>
        <span id="bingo-count" class="bingo-count-badge" hidden>0 BINGO 🎉</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
    </section>

    <div id="bingo-grid" class="bingo-grid"></div>

    <button id="reset-btn" class="reset-btn">🔄 Réinitialiser ma grille</button>

    <details class="others-section">
      <summary class="others-summary">👀 Progression des autres</summary>
      <div id="others-grid" class="others-grid"></div>
    </details>

  </main>
</div>

<div id="bingo-overlay" class="bingo-overlay" hidden>
  <div class="bingo-message">
    <div class="bingo-text">BINGO !</div>
    <div class="bingo-sub">Ligne complétée 🎊</div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script type="module" src="script.js"></script>
</body>
</html>
